# -----------------------------------------------------
# Hypridle Configuration (v0.55 Lua IPC Compatible)
# -----------------------------------------------------

general {
    lock_cmd = lock-screen                     # lock screen script
    before_sleep_cmd = loginctl lock-session   # lock before suspend
    # v0.55 Fix: Use the explicit Lua DPMS enable action string
    after_sleep_cmd = hyprctl dispatch 'hl.dsp.dpms({ action = "enable" })' 
    inhibit_sleep = 3                          # wait until screen is locked
}

listener {
    timeout = 150                              # 2.5min
    on-timeout = pidof hyprlock || launch-screensaver # start screensaver (if not locked)
}

listener {
    timeout = 300                              # 5min
    on-timeout = loginctl lock-session         # lock screen when timeout has passed
}

listener {
    timeout = 330                              # 5.5min
    # v0.55 Fix: Use explicit Lua DPMS table calls to disable/enable screens
    on-timeout = hyprctl dispatch 'hl.dsp.dpms({ action = "disable" })'
    on-resume = hyprctl dispatch 'hl.dsp.dpms({ action = "enable" })' && brightnessctl -r
}
