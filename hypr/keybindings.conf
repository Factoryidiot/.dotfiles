# -----------------------------------------------------
# Key Bindings
# -----------------------------------------------------
# For a complete list of available actions, see:
# https://wiki.hyprland.org/Configuring/Binds/

# -----------------------------------------------------
# NOTE FOR SCRIPTS:
# This file is parsed by ~/bin/keybindings. To ensure 
# correct categorization in the summary, use these keywords:
#
# [Launchers]   : terminal, walker, file manager, browser, notes, youtube, gmail
# [Window Mgmt] : killactive, fullscreen, floating, movefocus, resize, movewindow
# [Workspaces]  : workspace
# [Clipboard]   : universal, copy, paste, clipboard
# [Hardware]    : volume, mute, brightness, xf86, next, prev, play, pause
# [Session]     : exit, lock screen, idle
#
# hyprctl -j binds | jq -r '.[] | "\(.description) \(.dispatcher)"'
#
# -----------------------------------------------------


# Set the Super key (Windows key) as the main modifier
$mainMod = SUPER

# -----------------------------------------------------
# Application Launchers
# -----------------------------------------------------
bindd = $mainMod, RETURN, Terminal, exec, uwsm-app -- xdg-terminal-exec --dir="$(cmd-terminal-cwd)"
bindd = $mainMod, SPACE, Application menu, exec, launch-menu-applications
bindd = $mainMod ALT, SPACE, Menu, exec, launch-menu
bindd = $mainMod, F, File manager, exec, launch-or-focus-tui yazi
bindd = $mainMod, B, Web browser, exec, uwsm-app -- chromium

# Flatpak
bindd = $mainMod, P, Password manager, exec, launch-or-focus ^bitwarden$  "uwsm-app -- flatpak run com.bitwarden.desktop -disable-gpu --enable-wayland-ime"
bindd = $mainMod, N, Notes, exec, launch-or-focus ^obsidian$ "uwsm-app -- flatpak run md.obsidian.Obsidian -disable-gpu --enable-wayland-ime"

# Webapps
bindd = $mainMod SHIFT, Y, YouTube, exec, launch-webapp "https://youtube.com/"
bindd = $mainMod SHIFT, E, Gmail, exec, launch-webapp "https://gmail.com/"
bindd = $mainMod SHIFT, G, Gemini, exec, launch-webapp "https://gemini.google.com/"

# -----------------------------------------------------
# Window Management
# -----------------------------------------------------
bind = $mainMod, Q, killactive,                                   # Close active window
bind = $mainMod, G, fullscreen,                                   # Toggle fullscreen
bind = $mainMod, V, togglefloating,                               # Toggle floating window

# Move focus
bind = $mainMod, h, movefocus, l
bind = $mainMod, l, movefocus, r
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d

# Move window
bind = $mainMod SHIFT, h, movewindow, l
bind = $mainMod SHIFT, l, movewindow, r
bind = $mainMod SHIFT, k, movewindow, u
bind = $mainMod SHIFT, j, movewindow, d

# Resize window
bind = $mainMod ALT, h, resizeactive, -20 0
bind = $mainMod ALT, l, resizeactive, 20 0
bind = $mainMod ALT, k, resizeactive, 0 -20
bind = $mainMod ALT, j, resizeactive, 0 20

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Clipboard
bindd = SUPER, C, Universal copy, sendshortcut, CTRL, Insert,
bindd = SUPER, V, Universal paste, sendshortcut, SHIFT, Insert,
bindd = SUPER, X, Universal cut, sendshortcut, CTRL, X,
bindd = SUPER CTRL, V, Clipboard manager, exec, launch-menu-applications -m clipboard

# -----------------------------------------------------
# Workspaces
# -----------------------------------------------------
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move window to workspace
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Scroll through existing workspaces
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# -----------------------------------------------------
# Session Management
# -----------------------------------------------------
bind = $mainMod, X, exit,                                         # Exit Hyprland
bindd = $mainMod, L, Lock screen, exec, lock-screen               # Lock screen
bindd = $mainMod, I, Toggle idle, exec, toggle-idle # Toggle idle lock

# -----------------------------------------------------
# Hardware Keys
# -----------------------------------------------------
# OSD client configuration
$osdclient = swayosd-client --monitor "$(hyprctl monitors -j | jq -r '.[] | select(.focused == true).name')"

# Volume control
bindeld = ,XF86AudioRaiseVolume, Volume up, exec, $osdclient --output-volume raise
bindeld = ,XF86AudioLowerVolume, Volume down, exec, $osdclient --output-volume lower
bindeld = ,XF86AudioMute, Mute, exec, $osdclient --output-volume mute-toggle
bindeld = ALT, XF86AudioRaiseVolume, Volume up precise, exec, $osdclient --output-volume +1
bindeld = ALT, XF86AudioLowerVolume, Volume down precise, exec, $osdclient --output-volume -1

# Microphone control
bindeld = ,XF86AudioMicMute, Mute microphone, exec, $osdclient --input-volume mute-toggle

# Brightness control
bindeld = ,XF86MonBrightnessUp, Brightness up, exec, $osdclient --brightness raise
bindeld = ,XF86MonBrightnessDown, Brightness down, exec, $osdclient --brightness lower
bindeld = ALT, XF86MonBrightnessUp, Brightness up precise, exec, $osdclient --brightness +1
bindeld = ALT, XF86MonBrightnessDown, Brightness down precise, exec, $osdclient --brightness -1

# Media player control (requires playerctl)
bindld = ,XF86AudioNext, Next track, exec, $osdclient --playerctl next
bindld = ,XF86AudioPause, Pause, exec, $osdclient --playerctl play-pause
bindld = ,XF86AudioPlay, Play, exec, $osdclient --playerctl play-pause
bindld = ,XF86AudioPrev, Previous track, exec, $osdclient --playerctl previous

bindld = CAPS, Caps_Lock, Caps lock , exec, $osdclient --caps-lock

# Other
#bindld = SUPER, XF86AudioMute, Switch audio output, exec, cmd-audio-switch
