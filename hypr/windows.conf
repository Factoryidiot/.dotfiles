# -----------------------------------------------------
# Window Rules
# -----------------------------------------------------
# For a complete list of available actions, see:
# https://wiki.hyprland.org/Configuring/Window-Rules/ for more

windowrule = suppress_event maximize, match:class ^(.*)$

# --- Floating Windows Configuration ---

# 1. Define what windows should be tagged as 'floating-window'
# Included 'brave' in the class list and fixed the title regex from [] to ()
windowrule = tag +floating-window, match:class (dot.nix.manage-vms|dot.nix.display-keybindings|dot.nix.bluetui|dot.nix.impala|dot.nix.wiremix|dot.nix.btop|dot.nix.terminal|dot.nix.yazi|org.gnome.NautilusPreviewer|dot.nix.Evince|com.gabm.satty|Whio|About|TUI.float|imv|mpv|dot.nix.install-vm)
windowrule = tag +floating-window, match:class (brave|xdg-desktop-portal-gtk|sublime_text|DesktopEditors|org.gnome.Nautilus), match:title ^(Open.*Files?|Open [F|f]older.*|Save.*Files?|Save.*As|Save|All Files|.*wants to (open|save).*|[C|c]hoose.*)

# 2. Apply rules to the 'floating-window' tag
# Added 'tile 0' to ensure they don't snap back into a tile if they have a browser tag
windowrule = float 1, match:tag floating-window
windowrule = tile 0, match:tag floating-window
windowrule = center 1, match:tag floating-window
windowrule = size 875 600, match:tag floating-window

# Specific size overrides for Nix tools
windowrule = float 1, center 1, size 955 525, match:class dot.nix.display-about
windowrule = float 1, center 1, size 875 600, match:class dot.nix.display-keybindings
windowrule = float 1, center 1, size 875 600, match:class dot.nix.install-webapp
windowrule = float 1, center 1, size 875 600, match:class dot.nix.uninstall-webapp

windowrule = float 1, match:class org.gnome.Calculator

# --- Visuals & Opacity ---
windowrule = opacity 0.97 0.9, match:class ^(.*)$
windowrule = opacity 1 1, match:class ^(zoom|vlc|mpv|org.kde.kdenlive|com.obsproject.Studio|com.github.PintaProject.Pinta|imv|org.gnome.NautilusPreviewer)$
windowrule = rounding 8, match:tag pop

# --- XWayland Fixes ---
windowrule = match:class ^$, match:title ^$, match:xwayland 1, match:float 1, match:fullscreen 0, match:pin 0, no_initial_focus 1

# --- Screensaver ---
windowrule = fullscreen 1, match:class dot.nix.screensaver
windowrule = float 1, match:class dot.nix.screensaver
windowrule = opacity 1.0 override 1.0 override, match:class dot.nix.screensaver
windowrule = no_shadow 1, match:class dot.nix.screensaver

# --- Idle Inhibition ---
windowrule = idle_inhibit always, match:tag noidle

# --- Applications ---

# Bitwarden
windowrule = no_screen_share 1, match:class ^(Bitwarden)$
windowrule = tag +floating-window, match:class ^(Bitwarden)$

# Qemu
windowrule = opacity 1 1, match:class ^(qemu)$
windowrule = float 1, center 1, size 1024 768, match:class ^(qemu)$

# --- Browser Rules ---
windowrule = tag +chromium-based-browser, match:class (^brave|(google-)?[cC]hrom(e|ium)|[bB]rave-browser|[mM]icrosoft-edge|Vivaldi-stable|helium)
windowrule = tag +firefox-based-browser, match:class ([fF]irefox|zen|librewolf)

# Force tiling for browsers EXCEPT those that match our floating tags
windowrule = tile 1, match:tag chromium-based-browser

# Browser Opacity
windowrule = opacity 1 0.97, match:tag chromium-based-browser
windowrule = opacity 1 0.97, match:tag firefox-based-browser
windowrule = opacity 1.0 1.0, match:initial_title ((?i)(?:[a-z0-9-]+\.)*youtube\.com_/|app\.zoom\.us_/wc/home)

# --- Other Apps ---

# LocalSend
windowrule = float 1, center 1, match:class (Share|localsend)

# Steam
windowrule = float 1, match:class steam
windowrule = center 1, match:class steam, match:title Steam
windowrule = opacity 1 1, match:class steam
windowrule = size 1100 700, match:class steam, match:title Steam
windowrule = size 460 800, match:class steam, match:title Friends List
windowrule = idle_inhibit fullscreen, match:class steam

# --- Terminals ---
windowrule = tag +terminal, match:class (Alacritty)
windowrule = match:class (Alacritty), scroll_touchpad 1.5

# -----------------------------------------------------
# Workarounds & Overrides
# -----------------------------------------------------
# Ensure floating-window tag takes absolute priority over tiling tags
windowrule = tile 0, match:tag floating-window
windowrule = float 1, match:tag floating-window
