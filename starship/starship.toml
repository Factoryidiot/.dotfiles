# Powerline style with Nord color palette
#$username\
#[@](bg:nord0 fg:nord4)\
#$hostname\

format = """
[¯éÂ](nord0)\
$os\
[¯é░](bg:nord1 fg:nord0)\
$directory\
[¯é░](bg:nord2 fg:nord1)\
$git_branch\
$git_status\
$git_metrics\
[¯é░](bg:nord3 fg:nord2)\
$c\
$elixir\
$elm\
$golang\
$gradle\
$haskell\
$java\
$julia\
$lua\
$nodejs\
$nim\
$python\
$rust\
$scala\
$aws\
$docker_context\
[¯é░](fg:nord3)\
$fill\
([¯é▓](fg:nord3)$jobs$cmd_duration[¯é┤](nord0))
$status
"""

scan_timeout = 50
command_timeout = 1000
add_newline = false
palette = 'nord'

[fill]
symbol = ' '

[palettes.nord]
nord0 = '#2E3440'
nord1 = '#3B4252'
nord2 = '#434C5E'
nord3 = '#4C566A'
nord4 = '#D8DEE9'   # White
nord8 = '#88C0D0'
nord10 = '#81A1C1'
nord11 = '#BF616A'  # Red
nord12 = '#D08770'
nord13 = '#EBCB8B'  # Yellow
nord14 = '#A2BE8A'  # Green

# username, host and OS
[username]
style_root = 'bg:nord0 fg:nord11'
style_user = 'bg:nord0 fg:nord4'
format = '[$user]($style)'
show_always = true
disabled = false

[hostname]
ssh_only = false
ssh_symbol = ' ¯¼ü'
trim_at = '.'
format = '[$hostname$ssh_symbol]($style)'
style = 'bg:nord0 fg:nord4'
disabled = false

[os]
format = '[ $symbol ]($style)'
style = 'bg:nord0 fg:nord4'
disabled = false
# for symbols look at the end of the file

# directory
[directory]
truncation_length = 1
truncate_to_repo = true
format = '[ $path ]($style)[$read_only]($read_only_style)'
style = 'bg:nord1 fg:nord4'
disabled = false
read_only = ' ¾░î¥ '
read_only_style = 'bg:nord1 fg:nord11'
truncation_symbol = ''

[directory.substitutions]
'Documents' = '¾░êÖ'
'Downloads' = '´ÇÖ '
'Music' = '´Çü '
'Pictures' = '´Ç¥ '
'Projects' = '¯»ƒ '

# git
[git_branch]
symbol = '´Éÿ'
style = 'bg:nord2 fg:nord4'
format = '[ $symbol $branch ]($style)'

[git_status]
style = 'bg:nord2 fg:nord4'
format = '[$all_status$ahead_behind ]($style)'

[git_metrics]
added_style = 'bg:nord2 fg:nord14'
deleted_style = 'bg:nord2 fg:nord11'
format = '[+$added ]($added_style)[-$deleted ]($deleted_style)'
disabled = false

# programming
[c]
symbol = '¯ÿ× '
detect_extensions = ['c', 'h']
style = 'bg:nord3 fg:nord10'
format = '[ $symbol ($version) ]($style)'

[elixir]
symbol = '¯ëÁ '
style = 'bg:nord3 fg:nord4'
format = '[ $symbol ($version) ]($style)'

[elm]
symbol = '¯ÿ¼ '
style = 'bg:nord3 fg:nord4'
format = '[ $symbol ($version) ]($style)'

[golang]
symbol = '¯ÿº '
style = 'bg:nord3 fg:nord8'
format = '[ $symbol ($version) ]($style)'

[gradle]
style = 'bg:nord3 fg:nord4'
format = '[ $symbol ($version) ]($style)'

[haskell]
symbol = '¯ØÀ '
style = 'bg:nord3 fg:nord4'
format = '[ $symbol ($version) ]($style)'

[java]
symbol = '¯ëû '
style = 'bg:nord3 fg:nord4'
format = '[ $symbol ($version) ]($style)'

[julia]
symbol = '¯ÿñ '
style = 'bg:nord3 fg:nord4'
format = '[ $symbol ($version) ]($style)'

[lua]
symbol = '¯ÿá '
style = 'bg:nord3 fg:nord10'
format = '[ $symbol ($version )]($style)'

[nim]
symbol = '¾░åÑ '
style = 'bg:nord3 fg:nord4'
format = '[ $symbol ($version) ]($style)'

[nix_shell]
symbol = '´îô  '
style = 'bg:nord3 fg:nord8'
format = '[ $symbol ($version) ]($style)'

[nodejs]
symbol = '¯£ÿ'
style = 'bg:nord3 fg:nord4'
format = '[ $symbol ($version) ]($style)'

[python]
symbol = '¯£╝ '
style = 'bg:nord3 fg:nord4'
format = '[ $symbol ($version) (\($virtualenv\)) ]($style)'

[rust]
symbol = '¯×¿'
style = 'bg:nord3 fg:nord12'
format = '[ $symbol ($version) ]($style)'

[scala]
symbol = '¯£À '
style = 'bg:nord3 fg:nord4'
format = '[ $symbol ($version) ]($style)'

[aws]
symbol = '´ë░ '
style = 'bg:nord3 fg:nord4'
format = '[ $symbol($profile )(\[$duration\] )]($style)'

[docker_context]
symbol = '´îê '
style = 'fg:#06969A'
format = '[ $symbol ]($style) $path'
detect_files = ['docker-compose.yml', 'docker-compose.yaml', 'Dockerfile']
detect_extensions = ['Dockerfile']

[jobs]
symbol = '´Çô '
style = 'bg:nord3 fg:nord11'
number_threshold = 1
format = '[ $symbol $number ]($style)'

[cmd_duration]
min_time = 500
style = 'bg:nord3 fg:nord4'
format = '[ $duration ]($style)'

# status
#success_symbol = '[¯¬▓](fg:nord14)'
#symbol = '[´æº](fg:nord11)'
[status]
format = '[ $symbol ]($style)'
style = "bold"
symbol = '[ÔØ»](fg:nord11)'
success_symbol = '[ÔØ»](fg:nord14)'
not_executable_symbol = '[­ƒøç](fg:nord11)'
not_found_symbol = '[¾░ìë](fg:nord11)'
sigint_symbol = '[¯Çè](fg:nord13)'
signal_symbol = '[¯Çè](fg:nord11)'
disabled = false

